version: 2
updates:
  # Python runtime / dev dependencies.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      # Roll all non-major Python updates into one PR per week to keep noise low.
      python-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by workflows in this repo.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
